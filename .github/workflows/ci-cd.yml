name: CI/CD — Build, Test & Push

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  BACKEND_IMAGE:  ${{ secrets.DOCKERHUB_USERNAME }}/todo-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/todo-frontend

jobs:

  # ── 1. Сборка и тестирование ──────────────────────────────────────────────
  build-and-test:
    name: Build · Test · Push
    runs-on: ubuntu-latest

    steps:

      # 1.1 Клонируем репозиторий
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1.2 Настраиваем Docker Buildx (для кэширования слоёв)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 1.3 Логинимся в Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 1.4 Собираем образы
      - name: Build backend image
        run: |
          docker build \
            --tag ${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            --tag ${{ env.BACKEND_IMAGE }}:latest \
            ./backend

      - name: Build frontend image
        run: |
          docker build \
            --tag ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
            --tag ${{ env.FRONTEND_IMAGE }}:latest \
            ./frontend

      # 1.5 Поднимаем все контейнеры
      - name: Start all containers
        run: |
          docker compose up -d
          echo "⏳ Ожидаем старта сервисов..."
          sleep 15

      # 1.6 Проверяем статус контейнеров
      - name: Check container status
        run: docker compose ps

      # 1.7 Ждём, пока backend станет доступен
      - name: Wait for backend to be ready
        run: |
          echo "⏳ Ожидаем готовности backend..."
          for i in $(seq 1 20); do
            if curl -sf http://localhost/api/health; then
              echo "✅ Backend готов"
              break
            fi
            echo "  попытка $i/20..."
            sleep 3
          done

      # 1.8 HTTP-тесты через curl
      - name: Health check — GET /api/health
        run: |
          RESPONSE=$(curl -sf http://localhost/api/health)
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | grep -q '"ok"'
          echo "✅ Health check пройден"

      - name: Test — GET /api/tasks (пустой список)
        run: |
          RESPONSE=$(curl -sf http://localhost/api/tasks)
          echo "Response: $RESPONSE"
          echo "✅ GET /api/tasks — OK"

      - name: Test — POST /api/tasks (создать задачу)
        run: |
          RESPONSE=$(curl -sf -X POST http://localhost/api/tasks \
            -H "Content-Type: application/json" \
            -d '{"title":"CI Test Task","description":"Created by GitHub Actions","status":"pending"}')
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | grep -q '"CI Test Task"'
          TASK_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          echo "TASK_ID=$TASK_ID" >> $GITHUB_ENV
          echo "✅ POST /api/tasks — задача создана, id=$TASK_ID"

      - name: Test — GET /api/tasks/<id> (получить задачу)
        run: |
          RESPONSE=$(curl -sf http://localhost/api/tasks/${{ env.TASK_ID }})
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | grep -q '"CI Test Task"'
          echo "✅ GET /api/tasks/${{ env.TASK_ID }} — OK"

      - name: Test — PUT /api/tasks/<id> (обновить задачу)
        run: |
          RESPONSE=$(curl -sf -X PUT http://localhost/api/tasks/${{ env.TASK_ID }} \
            -H "Content-Type: application/json" \
            -d '{"status":"done"}')
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | grep -q '"done"'
          echo "✅ PUT /api/tasks/${{ env.TASK_ID }} — статус обновлён"

      - name: Test — DELETE /api/tasks/<id> (удалить задачу)
        run: |
          RESPONSE=$(curl -sf -X DELETE http://localhost/api/tasks/${{ env.TASK_ID }})
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | grep -q 'deleted\|удален'
          echo "✅ DELETE /api/tasks/${{ env.TASK_ID }} — OK"

      - name: Test — Frontend доступен
        run: |
          curl -sf http://localhost/ | grep -q "Todo List"
          echo "✅ Фронтенд загружается"

      # 1.9 Логи при провале (для отладки)
      - name: Show logs on failure
        if: failure()
        run: docker compose logs --tail=50

      # 1.10 Останавливаем и очищаем контейнеры
      - name: Stop and clean up containers
        if: always()
        run: |
          docker compose down -v --remove-orphans
          echo "✅ Контейнеры остановлены"

      # 1.11 Очищаем неиспользуемые образы
      - name: Clean up dangling images
        if: always()
        run: |
          docker image prune -f
          echo "✅ Лишние образы удалены"

      # 1.12 Пушим образы в Docker Hub (только при push в main/master)
      - name: Push backend image to Docker Hub
        if: github.event_name == 'push'
        run: |
          docker push ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          docker push ${{ env.BACKEND_IMAGE }}:latest
          echo "✅ Backend образ запушен"

      - name: Push frontend image to Docker Hub
        if: github.event_name == 'push'
        run: |
          docker push ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          docker push ${{ env.FRONTEND_IMAGE }}:latest
          echo "✅ Frontend образ запушен"

      # 1.13 Сводка
      - name: Summary
        if: always()
        run: |
          echo "## 🚀 CI/CD Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Образ | Тег |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| \`${{ env.BACKEND_IMAGE }}\` | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| \`${{ env.FRONTEND_IMAGE }}\` | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
