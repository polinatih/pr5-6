name: CI/CD — Build, Test & Push

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:

  build-and-test:
    name: Build · Test · Push
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build backend image
        run: |
          docker build \
            --tag polinatih/todo-backend:${{ github.sha }} \
            --tag polinatih/todo-backend:latest \
            ./backend

      - name: Build frontend image
        run: |
          docker build \
            --tag polinatih/todo-frontend:${{ github.sha }} \
            --tag polinatih/todo-frontend:latest \
            ./frontend

      - name: Start all containers
        run: |
          docker compose up -d
          echo "Ожидаем старта сервисов..."
          sleep 30

      - name: Check container status
        run: docker compose ps

      - name: Wait for backend to be ready
        run: |
          echo "Ожидаем готовности backend..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/health || true)
            echo "попытка $i/30, HTTP status: $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Backend готов!"
              break
            fi
            sleep 5
          done

      - name: Health check
        run: |
          RESPONSE=$(curl -sf http://localhost:8080/api/health)
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | grep -q '"ok"'
          echo "Health check OK"

      - name: GET /api/tasks
        run: |
          RESPONSE=$(curl -sf http://localhost:8080/api/tasks)
          echo "Response: $RESPONSE"
          echo "GET tasks OK"

      - name: POST /api/tasks
        run: |
          RESPONSE=$(curl -sf -X POST http://localhost:8080/api/tasks \
            -H "Content-Type: application/json" \
            -d '{"title":"CI Test Task","description":"Created by GitHub Actions","status":"pending"}')
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | grep -q '"CI Test Task"'
          TASK_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          echo "TASK_ID=$TASK_ID" >> $GITHUB_ENV
          echo "POST task OK, id=$TASK_ID"

      - name: GET /api/tasks by id
        run: |
          RESPONSE=$(curl -sf http://localhost:8080/api/tasks/$TASK_ID)
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | grep -q '"CI Test Task"'
          echo "GET task by id OK"

      - name: PUT /api/tasks by id
        run: |
          RESPONSE=$(curl -sf -X PUT http://localhost:8080/api/tasks/$TASK_ID \
            -H "Content-Type: application/json" \
            -d '{"status":"done"}')
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | grep -q '"done"'
          echo "PUT task OK"

      - name: DELETE /api/tasks by id
        run: |
          RESPONSE=$(curl -sf -X DELETE http://localhost:8080/api/tasks/$TASK_ID)
          echo "Response: $RESPONSE"
          echo "DELETE task OK"

      - name: Frontend available
        run: |
          curl -sf http://localhost:8080/ | grep -q "Todo List"
          echo "Frontend OK"

      - name: Show logs on failure
        if: failure()
        run: docker compose logs --tail=80

      - name: Stop containers
        if: always()
        run: docker compose down -v --remove-orphans

      - name: Clean up images
        if: always()
        run: docker image prune -f

      - name: Push backend to Docker Hub
        if: github.event_name == 'push'
        run: |
          docker push polinatih/todo-backend:${{ github.sha }}
          docker push polinatih/todo-backend:latest

      - name: Push frontend to Docker Hub
        if: github.event_name == 'push'
        run: |
          docker push polinatih/todo-frontend:${{ github.sha }}
          docker push polinatih/todo-frontend:latest

      - name: Summary
        if: always()
        run: |
          echo "## CI/CD Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| polinatih/todo-backend | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| polinatih/todo-frontend | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY